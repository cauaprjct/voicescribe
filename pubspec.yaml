name: voicescribe
description: "VoiceScribe - App de Transcrição de Áudio com IA"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Gerenciamento de estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Gravação de áudio
  record: ^5.0.0
  
  # Reprodução de áudio
  just_audio: ^0.9.39
  
  # Banco de dados
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  
  # Compartilhamento
  share_plus: ^9.0.0
  
  # Permissões
  permission_handler: ^11.3.1
  
  # Gerador de PDF
  pdf: ^3.11.0
  
  # Salvando arquivos
  file_picker: ^8.0.3
  
  # Formatação
  intl: ^0.19.0
  
  # Animações
  flutter_animate: ^4.5.0
  
  # Gráficos para estatísticas
  fl_chart: ^0.68.0
  
  # Waveform visual
  audio_waveforms: ^1.0.4
  
  # UUID para IDs únicas
  uuid: ^4.4.0
  
  # HTTP para chamadas de API
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11

dependency_overrides:
  record_linux: any
  record_macos: any
  record_windows: any

flutter:
  uses-material-design: true
